<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NextDrive | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="tela-login">
  <header class="topo">
    <h1>NextDrive | Login</h1>
    <button id="btnToggleTheme" class="btn-outline btn-theme-toggle" type="button">🌙 Escuro</button>
  </header>

  <main class="form-container auth-layout">
    <section class="auth-card">
      <div class="auth-side">
        <div class="auth-brand">
          <span>NextDrive</span>
          <small>Seu app de locação de veículos.</small>
        </div>
        <h2>Bem-vindo de volta!</h2>
        <p>Entre para continuar sua jornada na NextDrive com maior praticidade.</p>
        <div class="auth-metrics">
          <div><strong>250+</strong><span>Clientes</span></div>
          <div><strong>14.000+</strong><span>Reservas</span></div>
        </div>
      </div>

      <form id="formLogin" class="form-box auth-form">
        <div class="auth-header">
          <span class="auth-badge">Login</span>
          <h1>Faça seu login</h1>
          <p>Use seu e-mail e senha para acessar o painel.</p>
        </div>

        <div class="input-group">
          <input type="email" name="email" placeholder="E-mail" required>
          <input type="password" name="senha" placeholder="Senha" required>
        </div>

        <button type="submit" class="btn-principal">Entrar</button>
        <p class="link-troca">Ainda não tem conta? <a href="registro.html">Crie uma agora</a></p>
        <p id="mensagem" class="mensagem"></p>
      </form>
    </section>
  </main>

  <script src="js/ui.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
