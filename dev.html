<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Dev | NextDrive</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="tela-dev">

  <header class="topo">
    <h1>NextDrive 🚗 | Painel Dev</h1>
    <nav>
      <button id="btnVoltar" class="btn-nav">Voltar</button>
    </nav>
  </header>

  <main class="dev-container">
    <h2>Cadastrar novo carro</h2>

    <form id="formCarro" class="form-box">
      <input type="text" name="modelo" placeholder="Modelo" required>
      <input type="text" name="marca" placeholder="Marca" required>
      <input type="number" name="ano" placeholder="Ano" required>
      <input type="number" name="preco_diaria" placeholder="Preço por dia (R$)" required>
      <button type="submit" class="btn-principal">Adicionar Carro</button>
    </form>

    <div id="mensagem" class="mensagem"></div>
  </main>

  <script src="js/dev.js"></script>
</body>
</html>
