<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NextDrive | Registro</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="css/style.css" />
</head>

<body class="tela-registro">

  <!-- SIDEBAR -->
  <div id="sidebar" class="sidebar">

    <div class="sidebar-header">

      <h2>NextDrive 🚗</h2>

      <button
        id="btnFecharSidebar"
        class="close-btn"
      >
        ✖
      </button>

    </div>

    <nav class="sidebar-nav">

      <a href="index.html">
        Início
      </a>

      <a href="alugueis.html">
        Meus Aluguéis
      </a>

      <a href="perfil.html">
        Meu Perfil
      </a>

    </nav>
  </div>

  <!-- OVERLAY -->
  <div
    id="sidebarOverlay"
    class="sidebar-overlay"
  ></div>

  <!-- TOPO -->
  <header class="topo">

    <button
      id="btnMenu"
      class="menu-btn"
    >
      ☰
    </button>

    <h1>
      NextDrive 🚗 | Registro
    </h1>

  </header>

  <!-- FORMULÁRIO -->
  <div class="form-container">

    <form
      id="formRegistro"
      class="form-box"
    >

      <h1>
        Crie sua conta
      </h1>

      <p>
        Preencha as informações abaixo para começar.
      </p>

      <input
        type="text"
        name="nome"
        placeholder="Nome completo"
        required
      />

      <input
        type="text"
        name="cpf"
        placeholder="CPF"
        required
      />

      <input
        type="text"
        name="cnh"
        placeholder="CNH"
        required
      />

      <input
        type="tel"
        name="tel"
        placeholder="Telefone (opcional)"
      />

      <input
        type="email"
        name="email"
        placeholder="E-mail"
        required
      />

      <input
        type="password"
        name="senha"
        placeholder="Senha"
        required
      />

      <button
        type="submit"
        class="btn-principal"
      >
        Registrar
      </button>

      <p class="link-troca">
        Já possui conta?

        <a href="login.html">
          Faça login
        </a>
      </p>

      <div
        id="mensagem"
        class="mensagem"
      ></div>

    </form>
  </div>

  <!-- SCRIPTS -->
  <script src="js/sidebar.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/cadastro.js"></script>

</body>
</html>
