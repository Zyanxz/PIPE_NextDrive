<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NextDrive | Registro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="tela-registro">
  <header class="topo">
    <h1>NextDrive | Registro</h1>
    <button id="btnToggleTheme" class="btn-outline btn-theme-toggle" type="button">🌙 Escuro</button>
  </header>

  <main class="form-container auth-layout">
    <section class="auth-card">
      <div class="auth-side">
        <div class="auth-brand">
          <span>NextDrive</span>
          <small>O aluguel de carros mais moderno.</small>
        </div>
        <h2>Comece agora</h2>
        <p>Crie sua conta e tenha acesso rápido aos melhores veículos e reservas.</p>
        <div class="auth-metrics">
          <div><strong>120+</strong><span>Carros</span></div>
          <div><strong>99%</strong><span>Satisfação</span></div>
        </div>
      </div>

      <form id="formRegistro" class="form-box auth-form">
        <div class="auth-header">
          <span class="auth-badge">Registro</span>
          <h1>Crie sua conta</h1>
          <p>Preencha os dados abaixo para começar a usar a NextDrive.</p>
        </div>

        <div class="input-group">
          <input type="text" name="nome" placeholder="Nome completo" required>
          <input type="text" name="cpf" placeholder="CPF" required>
          <input type="text" name="cnh" placeholder="CNH" required>
          <input type="tel" name="tel" placeholder="Telefone (opcional)">
          <input type="email" name="email" placeholder="E-mail" required>
          <input type="password" name="senha" placeholder="Senha" required>
        </div>

        <button type="submit" class="btn-principal">Registrar</button>
        <p class="link-troca">Já possui conta? <a href="login.html">Faça login</a></p>
        <div id="mensagem" class="mensagem"></div>
      </form>
    </section>
  </main>

  <script src="js/ui.js"></script>
  <script src="js/cadastro.js"></script>
</body>
</html>
