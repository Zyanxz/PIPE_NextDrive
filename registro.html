<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NextDrive | Registro</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="tela-registro">

  <div class="form-container">
    <form id="formRegistro" class="form-box">
      <h1>Crie sua conta</h1>
      <p>Preencha as informações abaixo para começar.</p>

      <input type="text" name="nome" placeholder="Nome completo" required />
      <input type="email" name="email" placeholder="E-mail" required />
      <input type="password" name="senha" placeholder="Senha" required />
      <button type="submit" class="btn-principal">Registrar</button>

      <p class="link-troca">Já possui conta? <a href="login.html">Faça login</a></p>
      <div id="mensagem" class="mensagem"></div>
    </form>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
