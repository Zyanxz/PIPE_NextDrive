<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NextDrive | Meu Perfil</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
    <div class="sidebar-header">
        <img src="img/logonxd.jpeg" alt="NextDrive" class="logo-sidebar">
        <button id="btnFecharSidebar">✕</button>
    </div>

    <nav>
        <a href="index.html">Início</a>
        <a href="alugueis.html">Meus Aluguéis</a>
        <a href="perfil.html">Meu Perfil</a>
    </nav>
</div>

<div id="sidebarOverlay" class="sidebar-overlay"></div>

<!-- HEADER -->
<header class="topo">

    <div class="logo-area">
        <img src="img/logonxd.jpeg" alt="NextDrive" class="logo">

        <div>
            <h1>Meu Perfil</h1>
            <span>Gerencie suas informações</span>
        </div>
    </div>

    <button id="btnMenu" class="menu-btn">☰</button>

</header>

<!-- PERFIL -->
<main>

    <section class="profile-card">

        <div class="profile-left">
            <div id="avatar" class="avatar"></div>
        </div>

        <div class="profile-right">

            <h2 id="pv-nome">Carregando...</h2>

            <p id="pv-role">Usuário</p>

            <div class="profile-stats">
                <div>
                    <strong id="stat-alugueis">0</strong>
                    <span>Reservas</span>
                </div>

                <div>
                    <strong id="stat-carros">0</strong>
                    <span>Veículos</span>
                </div>
            </div>

            <p id="pv-bio" class="profile-bio">
                Atualize seus dados para melhorar sua experiência.
            </p>

            <button id="editarPerfil" class="btn-primary">
                Editar perfil
            </button>

        </div>

    </section>

    <!-- FORMULÁRIO -->
    <section id="perfilForm" class="form-box" style="display:none; margin-top:20px;">

        <h2>Editar informações</h2>

        <form id="formPerfil">

            <input type="text" name="nome" placeholder="Nome completo" required>
            <input type="text" name="cpf" placeholder="CPF" required>
            <input type="text" name="cnh" placeholder="CNH" required>
            <input type="tel" name="tel" placeholder="Telefone">
            <input type="email" name="email" placeholder="E-mail" required>
            <input type="password" name="senha" placeholder="Nova senha (opcional)">

            <div style="display:flex;gap:10px;">
                <button type="submit" class="btn-primary">Salvar</button>
                <button type="button" id="cancelEdit" class="btn-outline">Cancelar</button>
            </div>

        </form>

        <div id="mensagem" class="mensagem"></div>

    </section>

    <!-- HISTÓRICO -->
    <section class="form-box" style="margin-top:20px;">

        <h2>Histórico de reservas</h2>

        <div id="historicoAlugueis">
            Carregando...
        </div>

    </section>

</main>

<script src="js/sidebar.js"></script>
<script src="js/ui.js"></script>
<script src="js/perfil.js"></script>

</body>
</html>
