<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NextDrive | Perfil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="tela-registro">
  <div id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <h2>NextDrive</h2>
      <button id="btnFecharSidebar" class="close-btn" type="button" aria-label="Fechar menu">x</button>
    </div>

    <nav class="sidebar-nav">
      <a href="index.html">Início</a>
      <a href="alugueis.html">Meus Aluguéis</a>
      <a href="perfil.html">Meu Perfil</a>
    </nav>
  </div>

  <div id="sidebarOverlay" class="sidebar-overlay"></div>

  <header class="topo">
    <button id="btnMenu" class="menu-btn" type="button" aria-label="Abrir menu">Menu</button>
    <button onclick="window.location.href='index.html'" class="close-btn" type="button">Voltar</button>
    <h1>Perfil</h1>
    <div class="nav-actions">
      <button id="btnToggleTheme" class="btn-outline" type="button">Dark</button>
    </div>
  </header>

  <main class="perfil-container">
    <section class="profile-card">
      <div class="profile-left">
        <div id="avatar" class="avatar"></div>
      </div>
      <div class="profile-right">
        <div class="profile-head">
          <h2 id="pv-nome">Nome</h2>
          <button id="editarPerfil" class="btn-principal edit-btn" type="button">Editar Perfil</button>
        </div>
        <p id="pv-role" class="muted">Usuário</p>
        <div class="profile-stats">
          <div><strong id="stat-alugueis">0</strong><span>Aluguéis</span></div>
          <div><strong id="stat-carros">0</strong><span>Carros</span></div>
        </div>
        <p id="pv-bio" class="profile-bio muted">Sem informações adicionais.</p>
      </div>
    </section>

    <section id="perfilForm" class="form-box perfil-form">
      <h2>Editar Perfil</h2>
      <p class="muted">Altere seus dados abaixo e clique em salvar.</p>

      <form id="formPerfil">
        <input type="text" name="nome" placeholder="Nome completo" required>
        <input type="text" name="cpf" placeholder="CPF" required>
        <input type="text" name="cnh" placeholder="CNH" required>
        <input type="tel" name="tel" placeholder="Telefone (opcional)">
        <input type="email" name="email" placeholder="E-mail" required>
        <input type="password" name="senha" placeholder="Senha (apenas se quiser alterar)">

        <div class="button-row">
          <button type="submit" class="btn-principal">Salvar alterações</button>
          <button type="button" id="cancelEdit" class="close-btn">Cancelar</button>
        </div>
      </form>

      <div id="mensagem" class="mensagem"></div>
    </section>
  </main>

  <script src="js/sidebar.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/perfil.js"></script>
</body>
</html>
